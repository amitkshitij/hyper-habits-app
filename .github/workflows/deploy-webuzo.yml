name: Deploy to Webuzo (hyper-habits-app)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: webuzo-hyper-habits-app-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ─────────────────────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ─────────────────────────────────────────────────────────────
      # 2. Node.js setup with cache
      # ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ─────────────────────────────────────────────────────────────
      # 3. Install JS dependencies
      # ─────────────────────────────────────────────────────────────
      - name: Install Node dependencies
        run: |
          echo "Node $(node --version) | npm $(npm --version)"
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      # ─────────────────────────────────────────────────────────────
      # 4. Build Vue/Webpack assets (once, here in CI)
      # ─────────────────────────────────────────────────────────────
      - name: Build production assets
        run: |
          echo "=== Building Vue assets with Laravel Mix ==="
          NODE_OPTIONS=--openssl-legacy-provider npm run production
          echo "=== Build complete ==="
          echo "Built files:"
          find public -type f \( -name "*.js" -o -name "*.css" \) | grep -v chunks | head -10

      # ─────────────────────────────────────────────────────────────
      # 5. Setup SSH key (using env var — avoids heredoc formatting issues)
      # ─────────────────────────────────────────────────────────────
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.APP_SERVER_SSH_KEY }}
          SSH_HOST: ${{ secrets.APP_SERVER_HOST }}
        run: |
          echo "=== Setting up SSH ==="
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "=== SSH ready ==="

      # ─────────────────────────────────────────────────────────────
      # 6. Sync files to server (excluding .env, vendor, node_modules, .git)
      #    Built public/js and public/css ARE included (built in step 4)
      # ─────────────────────────────────────────────────────────────
      - name: Sync files to server
        env:
          DEPLOY_USER: ${{ secrets.APP_SERVER_USER }}
          DEPLOY_HOST: ${{ secrets.APP_SERVER_HOST }}
          DEPLOY_PORT: ${{ secrets.APP_SERVER_PORT }}
        run: |
          APP_DIR="/home/kisvps/public_html/app.hyper-habits.com"
          echo "=== Syncing to $DEPLOY_HOST:$APP_DIR ==="

          # Ensure target dir exists
          ssh -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no \
            "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p $APP_DIR"

          # Sync everything except secrets/heavy dirs
          # NOTE: public/js and public/css are synced (built above)
          rsync -az --delete \
            --exclude='.env' \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='storage/logs/*.log' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='bootstrap/cache/*.php' \
            -e "ssh -p $DEPLOY_PORT -o StrictHostKeyChecking=no" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/"

          echo "=== Sync complete ==="

      # ─────────────────────────────────────────────────────────────
      # 7. Sync DB env values into the server .env
      #    Only the database credentials are updated; other production
      #    settings on the server remain untouched.
      # ─────────────────────────────────────────────────────────────
      - name: Update server DB env
        env:
          DEPLOY_USER: ${{ secrets.APP_SERVER_USER }}
          DEPLOY_HOST: ${{ secrets.APP_SERVER_HOST }}
          DEPLOY_PORT: ${{ secrets.APP_SERVER_PORT }}
        run: |
          set -a
          . ./.env
          set +a

          DB_CONNECTION_ESCAPED=$(printf '%q' "$DB_CONNECTION")
          DB_HOST_ESCAPED=$(printf '%q' "$DB_HOST")
          DB_PORT_ESCAPED=$(printf '%q' "$DB_PORT")
          DB_DATABASE_ESCAPED=$(printf '%q' "$DB_DATABASE")
          DB_USERNAME_ESCAPED=$(printf '%q' "$DB_USERNAME")
          DB_PASSWORD_ESCAPED=$(printf '%q' "$DB_PASSWORD")

          APP_DIR="/home/kisvps/public_html/app.hyper-habits.com"

          ssh -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "DB_CONNECTION=$DB_CONNECTION_ESCAPED DB_HOST=$DB_HOST_ESCAPED DB_PORT=$DB_PORT_ESCAPED DB_DATABASE=$DB_DATABASE_ESCAPED DB_USERNAME=$DB_USERNAME_ESCAPED DB_PASSWORD=$DB_PASSWORD_ESCAPED APP_DIR=$APP_DIR bash -s" <<'REMOTE'
          set -e
          cd "$APP_DIR"

          php -r '
          $path = ".env";
          $values = [
              "DB_CONNECTION" => getenv("DB_CONNECTION"),
              "DB_HOST" => getenv("DB_HOST"),
              "DB_PORT" => getenv("DB_PORT"),
              "DB_DATABASE" => getenv("DB_DATABASE"),
              "DB_USERNAME" => getenv("DB_USERNAME"),
              "DB_PASSWORD" => getenv("DB_PASSWORD"),
          ];

          $lines = file_exists($path)
              ? file($path, FILE_IGNORE_NEW_LINES)
              : [];

          $updated = [];
          foreach ($lines as &$line) {
              foreach ($values as $key => $value) {
                  if (strpos($line, $key . "=") === 0) {
                      $line = $key . '="' . addcslashes($value, "\\\"") . '"';
                      $updated[$key] = true;
                      break;
                  }
              }
          }
          unset($line);

          foreach ($values as $key => $value) {
              if (!isset($updated[$key])) {
                  $lines[] = $key . '="' . addcslashes($value, "\\\"") . '"';
              }
          }

          file_put_contents($path, implode(PHP_EOL, $lines) . PHP_EOL);
          '
          REMOTE

      # ─────────────────────────────────────────────────────────────
      # 8. Run server-side post-deploy tasks (PHP only — no npm rebuild)
      # ─────────────────────────────────────────────────────────────
      - name: Post-deploy server tasks
        env:
          DEPLOY_USER: ${{ secrets.APP_SERVER_USER }}
          DEPLOY_HOST: ${{ secrets.APP_SERVER_HOST }}
          DEPLOY_PORT: ${{ secrets.APP_SERVER_PORT }}
        run: |
          APP_DIR="/home/kisvps/public_html/app.hyper-habits.com"

          ssh -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no \
            "$DEPLOY_USER@$DEPLOY_HOST" bash << REMOTE
          set -e
          cd "$APP_DIR"
          echo "=== Working in: \$(pwd) ==="

          echo "--- Clearing stale Laravel caches before install/migrate ---"
          php artisan optimize:clear

          echo "--- Installing PHP dependencies ---"
          composer install --no-dev --optimize-autoloader --quiet

          echo "--- Running DB migrations ---"
          php artisan migrate --force

          echo "--- Clearing & caching config ---"
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear
          php artisan config:cache
          php artisan route:cache

          echo "--- Setting file permissions ---"
          chmod -R 755 public/
          chmod -R 775 storage/ bootstrap/cache/
          chown -R kisvps:kisvps storage/ bootstrap/cache/ public/

          echo "--- Deployment finished successfully ---"
          REMOTE

      # ─────────────────────────────────────────────────────────────
      # 9. Verify deployment
      # ─────────────────────────────────────────────────────────────
      - name: Verify deployment
        env:
          DEPLOY_USER: ${{ secrets.APP_SERVER_USER }}
          DEPLOY_HOST: ${{ secrets.APP_SERVER_HOST }}
          DEPLOY_PORT: ${{ secrets.APP_SERVER_PORT }}
        run: |
          APP_DIR="/home/kisvps/public_html/app.hyper-habits.com"

          ssh -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no \
            "$DEPLOY_USER@$DEPLOY_HOST" bash << REMOTE
          APP_DIR="$APP_DIR"
          echo "=== Deployment Verification ==="
          [ -f "\$APP_DIR/public/js/app.js" ]   && echo "✅ JS assets present"   || echo "❌ JS assets MISSING"
          [ -f "\$APP_DIR/public/css/app.css" ]  && echo "✅ CSS assets present"  || echo "❌ CSS assets MISSING"
          [ -f "\$APP_DIR/public/index.html" ]   && echo "✅ index.html present"  || echo "❌ index.html MISSING"
          [ -f "\$APP_DIR/.env" ]                && echo "✅ .env preserved"      || echo "⚠️  .env not found (check manually)"
          [ -d "\$APP_DIR/vendor" ]              && echo "✅ Vendor installed"    || echo "❌ Vendor MISSING"
          echo ""
          echo "🌐 Live at: https://app.hyper-habits.com"
          REMOTE

      # ─────────────────────────────────────────────────────────────
      # 10. Notify on failure
      # ─────────────────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED. Review the steps above for details."
          echo "Tip: Check SSH key secret, server disk space, and composer/artisan errors."
